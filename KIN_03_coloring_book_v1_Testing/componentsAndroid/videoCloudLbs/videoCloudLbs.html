<style type="text/css">
  :host {
    display: block;
    width: 100%;
    /* Sin height: el aspect-ratio del tag host calcula el alto automáticamente */
    overflow: hidden;
  }
  .vc-fill {
    position: absolute;
    inset: 0;
    display: flex;
    align-items: center;
    justify-content: center;
    background: #0a0a0a;
    box-sizing: border-box;
  }
  .vc-state {
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 8px;
    padding: 16px;
    text-align: center;
    color: #ccc;
    font-family: sans-serif;
    font-size: 13px;
  }
  .vc-icon {
    width: 36px;
    height: 36px;
    opacity: .5;
  }
  .vc-msg  { margin: 0; line-height: 1.5; }
  .vc-title {
    font-size: 14px;
    font-weight: 600;
    color: #e5e5e5;
    margin: 0;
  }
  .vc-retry {
    margin-top: 10px;
    padding: 7px 22px;
    border: 1px solid rgba(222,136,57,.5);
    border-radius: 4px;
    background: transparent;
    color: #de8839;
    font-size: 12px;
    letter-spacing: .03em;
    cursor: pointer;
    transition: background .2s, color .2s;
  }
  .vc-retry:hover { background: #de8839; color: #fff; }
  .vc-iframe {
    width: 100%;
    height: 100%;
    border: none;
    display: block;
  }
  .vc-spinner {
    width: 28px;
    height: 28px;
    border: 3px solid #333;
    border-top-color: #de8839;
    border-radius: 50%;
    animation: vc-spin 0.8s linear infinite;
  }
  @keyframes vc-spin { to { transform: rotate(360deg); } }
</style>

<div id="state-loading" class="vc-fill">
  <span class="vc-spinner"></span>
</div>

<div id="state-offline" class="vc-fill" style="display:none;">
  <div class="vc-state">
    <svg class="vc-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
      <line x1="1" y1="1" x2="23" y2="23"/>
      <path d="M16.72 11.06A10.94 10.94 0 0 1 19 12.55"/>
      <path d="M5 12.55a10.94 10.94 0 0 1 5.17-2.39"/>
      <path d="M10.71 5.05A16 16 0 0 1 22.56 9"/>
      <path d="M1.42 9a15.91 15.91 0 0 1 4.7-2.88"/>
      <path d="M8.53 16.11a6 6 0 0 1 6.95 0"/>
      <circle cx="12" cy="20" r="1" fill="currentColor" stroke="none"/>
    </svg>
    <p class="vc-title">Sin conexión</p>
    <p class="vc-msg">Verifica tu red e intenta de nuevo.</p>
    <button class="vc-retry">Reintentar</button>
  </div>
</div>

<div id="state-no-src" class="vc-fill" style="display:none;">
  <div class="vc-state">
    <svg class="vc-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
      <polygon points="23 7 16 12 23 17 23 7"/>
      <rect x="1" y="5" width="15" height="14" rx="2" ry="2"/>
    </svg>
    <p class="vc-title">Video no configurado</p>
  </div>
</div>

<div id="state-player" class="vc-fill" style="display:none;">
  <iframe class="vc-iframe" frameborder="0" allowfullscreen
    allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture; web-share"
    referrerpolicy="strict-origin-when-cross-origin"></iframe>
</div>
